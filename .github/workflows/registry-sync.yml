name: Registry Sync

on:
  push:
    branches: [main]
    paths:
      - 'native/**/*.md'
      - 'ext/**/*.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: [self-hosted, linux, kiva]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          
      - name: Generate Registry
        id: generate
        run: |
          python tools/registry-gen.py --output REGISTRY.yaml.new
          
          # Check if there are changes
          if diff -q REGISTRY.yaml REGISTRY.yaml.new > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            rm REGISTRY.yaml.new
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            mv REGISTRY.yaml.new REGISTRY.yaml
          fi
          
      - name: Commit Changes
        if: steps.generate.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add REGISTRY.yaml
          git commit -m "chore(registry): auto-sync REGISTRY.yaml from SKILL.md files"
          git push
          
      - name: Create Pull Request
        if: steps.generate.outputs.changed == 'true'
        uses: actions/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(registry): auto-sync REGISTRY.yaml"
          title: "chore(registry): Auto-sync REGISTRY.yaml"
          body: |
            This PR auto-generates REGISTRY.yaml from SKILL.md files.
            
            Generated by GitHub Actions - Registry Sync workflow
            
            <!-- Auto-generated -->
          branch: chore/registry-sync
          delete-branch: true

  notify:
    needs: sync
    runs-on: [self-hosted, linux, kiva]
    
    steps:
      - name: Notify Success
        if: needs.sync.result == 'success'
        run: echo "Registry sync completed successfully"
        
      - name: Notify Failure
        if: needs.sync.result == 'failure'
        run: echo "Registry sync failed"
